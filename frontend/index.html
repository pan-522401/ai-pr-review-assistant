<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PR Review Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>AI PR Review Assistant</h1>
    <p class="subtitle">智能代码审查 · 后端驱动版</p>
  </header>

  <main class="main">
    <section class="left-panel">
      <div class="input-area">
        <label for="pr-url">GitHub PR URL</label>
        <div class="input-row">
          <input type="url" id="pr-url" placeholder="https://github.com/facebook/react/pull/12345" autocomplete="url">
          <button id="analyze-btn">分析</button>
        </div>
        <p id="error" class="error hidden"></p>
      </div>

      <div id="result-area" class="result-area hidden">
        <div class="result-header">
          <span id="pr-meta" class="pr-meta"></span>
        </div>
        <div class="result-section">
          <h3>变更总结</h3>
          <p id="summary" class="summary-text"></p>
        </div>
        <div class="result-section">
          <h3>风险代码</h3>
          <ul id="risks-list" class="risk-list"></ul>
        </div>
        <div class="result-section">
          <h3>Review 建议</h3>
          <ul id="suggestions-list" class="suggestion-list"></ul>
        </div>
      </div>

      <div id="loading" class="loading-card hidden">
        <span class="spinner"></span>
        <span>正在分析 PR，请稍候...</span>
      </div>

      <div id="placeholder" class="placeholder">
        <p>输入 GitHub PR URL 并点击「分析」开始审查</p>
      </div>
    </section>

    <aside class="right-panel">
      <h2>历史记录</h2>
      <ul id="history-list" class="history-list"></ul>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
